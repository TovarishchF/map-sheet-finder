<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Советская разграфка | Номенклатурный справочник</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=108513615', 'ym');

        ym(108513615, 'init', {ssr:true, webvisor:true, clickmap:true, referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/108513615" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <div class="logo">
                <h1>Разграфка карт</h1>
                <span class="badge">Советская номенклатурная система</span>
            </div>
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Номенклатура (напр. N-37-56-А-в-1)" />
                    <button id="search-btn">Найти</button>
                </div>
                <div class="coords-box">
                    <input type="text" id="lat-input" placeholder="Широта" />
                    <input type="text" id="lng-input" placeholder="Долгота" />
                    <button id="go-coords-btn">Перейти</button>
                </div>
            </div>
        </div>

        <div class="main-area">
            <div class="sidebar">
                <div class="info-panel">
                    <h3>Текущий лист</h3>
                    <div class="info-row">
                        <span class="label">Номенклатура</span>
                        <span id="current-nomenclature" class="value">—</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Масштаб</span>
                        <span id="current-scale" class="value">—</span>
                    </div>
                    <div class="bounds-box">
                        <div class="bounds-row"><span>С:</span> <span id="bound-north">—</span></div>
                        <div class="bounds-row"><span>Ю:</span> <span id="bound-south">—</span></div>
                        <div class="bounds-row"><span>З:</span> <span id="bound-west">—</span></div>
                        <div class="bounds-row"><span>В:</span> <span id="bound-east">—</span></div>
                    </div>
                    <div id="error-message" class="error-message"></div>
                </div>

                <div class="nav-panel">
                    <button id="back-btn" disabled>← Назад</button>
                </div>

                <div class="legend">
                    <div class="legend-item"><span class="color-current"></span> Границы текущего листа</div>
                    <div class="legend-item"><span class="color-grid"></span> Сетка разграфки</div>
                </div>

                <div class="copyright">
                    <span>© Е.Д. Фанин, 2026</span>
                    <a href="https://github.com/TovarishchF/map-sheet-finder" target="_blank" rel="noopener noreferrer" class="github-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display: block;">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57C20.565 21.795 24 17.31 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                        <span>GitHub</span>
                    </a>
                </div>
            </div>

            <div id="map">
                <div class="crosshair"></div>
            </div>
        </div>

        <div id="next-scale-panel" class="floating-scale-panel" style="display: none;">
            <div class="panel-header">
                <span>Выберите масштаб</span>
                <button id="close-scale-panel" class="close-btn">&times;</button>
            </div>
            <div id="next-scale-buttons" class="scale-buttons"></div>
        </div>
    </div>

    <div id="ambiguous-scale-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Неоднозначная номенклатура</h3>
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="select-option1"></button>
                <button id="select-option2"></button>
            </div>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay" style="display: none;"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
